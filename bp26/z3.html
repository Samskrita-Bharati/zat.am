<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>BodhaPlay पुनरुक्ति - made with ZIM</title>
    <link rel="stylesheet" href="css/header.css" />
    <style>
        #bp26-z-tooltip {
            position: fixed;
            z-index: 10001;
            display: none;
            pointer-events: none;
            background: rgba(17, 24, 39, 0.92);
            color: #fff;
            font-size: 13px;
            line-height: 1.25;
            padding: 6px 8px;
            border-radius: 8px;
            max-width: min(75vw, 320px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        }
    </style>
    <!-- zimjs.com - JavaScript Canvas Framework -->
    <script src="https://cdn.jsdelivr.net/npm/@sanskrit-coders/sanscript@1.1.0/sanscript.min.js"></script>
    <script src="./js/transliteration.js"></script>
    <script type="text/javascript" src="https://unpkg.com/papaparse@latest/papaparse.min.js"></script>
    <script type="module">
        import zim from "https://zimjs.org/cdn/019/zim_game";
        // See Docs under Frame for FIT, FILL, FULL, and TAG
        // 768 x 1024 good for tablets, laptops, desktops 
        // 500 x 1000 good for phones
        new Frame(FIT, 768, 1024, black, dark, ready, "gf_Tourney", "gf_Sarala");
        function ready() {
            let tile;
            var wintmp;
            var wpp = 15; // words per page
            var fullist = "";
            const urlParams = new URLSearchParams(window.location.search);
            const translit = window.bp26Translit;
            const tScript = translit.getTargetScript();
            var set = urlParams.get('s');
            if (!set || isNaN(set))
                set = 0;
            var lnk = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6CFR_0gDsZl-lmwLFWmtdXMXYGVEHGJ8fvBu2_5wvbEl9L-4Yr0ugI0TFTTdvtLlMTRmLnCIJ5FBF/pub?gid=0&single=true&output=csv";
            Papa.parse(lnk, {
                download: true,
                header: true,
                complete: populateWlist
            })
            function populateWlist(fildat) {
                fullist = fildat.data;
                if (set > fildat.data.length / wpp) set = 0;
                var openmojibase = "https://openmoji.org/data/color/svg/";
                var image = [];
                var words = [];
                var aud = [];
                var imglnk = "";
                for (var i = 0; i < wpp; i++) {
                    words.push(fullist[(set * wpp) + i].padam);
                    imglnk = fullist[(set * wpp) + i]["Imaage link"];
                    image.push(imglnk);
                    aud.push(fullist[(set * wpp) + i]["alnk"]);
                }
                var tillabs = [];
                // given F (Frame), S (Stage), W (width), H (height)
                // put code here
                // see https://zimjs.com/docs.html for info on any of these commands
                new Label("पुनरुक्ति 🤔", 80, "Tourney", "tomato").pos(0, 70, CENTER);
                new Label("What repeats?", 50, "Tourney", "tomato").pos(0, 180, CENTER);
                let special;
                function setSpecial() {
                    //S.clear();
                    tillabs = [];
                    var mywords = words.slice();
                    special = rand(wpp-1); // index starts at 0
                    wintmp = mywords[special]
                    if (tScript) wintmp += "\n" + translit.transliterate(String(wintmp), 'devanagari');
                    for (var j = 0; j < wpp; j++) {
                        var wrd = mywords.pop();
                        if (tScript) wrd += "\n" + translit.transliterate(String(wrd), 'devanagari')
                        tillabs.push(new Label(wrd, 15, "Sarala", yellow));
                    }
                    //zog(wintmp); // reveals the secret
                    var wlab = new Label(wintmp, 15, "Sarala", yellow);
                    wlab.win = true;
                    tillabs.push(wlab);
                    shuffle(tillabs);
                    STYLE = {
                        align: CENTER,
                        once: true
                    }
                    tile = new Tile(tillabs, 4, 4, 30, 30, true)
                        .scaleTo(S, 75)
                        .cur() // adds a finger or use .cur("crosshair"), etc.
                        .center();
                    S.update();
                }
                setSpecial();
                const emitter = new Emitter({
                    startPaused: true
                });
                tile.on("mousedown", e => {
                    const pick = e.target; // this gets what caused the event
                    if (wintmp == pick.text) {
                        emitter.loc(pick).spurt(25);
                        tile.noMouse(); // do not let player press on tile
                        end.noMouse(); // do not let player close the pane right away
                        timeout(5, () => { // wait for 1 second then let player close pane
                            window.location.reload();
                        })
                        timeout(1, () => { // wait for 1 second then let player close pane
                            // Show popup and submit score
                            submitScoreNow(timer.time * 3);
                            new Pane(wintmp + "\nScore: " + timer.time * 3,yellow).show();
                        });
                    } else {
                        wrong.score++;
                        pick.color = grey;
                        S.update()
                    }
                })
                //const right = new Scorer({ backgroundColor: green }).pos(100, 80, RIGHT, BOTTOM);
                const wrong = new Scorer({ color: white, backgroundColor: red }).pos(100, 80, LEFT, BOTTOM);
                const timer = new Timer(20).pos(0, 80, CENTER, BOTTOM);
                STYLE = { font: "Tourney", backdropColor: black.toAlpha(.8) }
                const end = new Pane("समाप्तम्" + "\nIt was " + wintmp, yellow);
                timer.on("complete", () => {
                    end.show(); // show end
                    tile.noMouse(); // do not let player press on tile
                    end.noMouse(); // do not let player close the pane right away
                    timeout(1, () => { // wait for 1 second then let player close pane
                        end.mouse();
                    });
                });
            }
        }
    </script>
    <meta name="viewport" content="width=device-width, user-scalable=no" />
</head>
    <body>
        <script type="module" src="/auth/api/middleware.js"></script>
        <div id="header-placeholder"></div>
        <script type="module" src="../js/bilingual-toggle.js"></script>
        <script src="js/load-header.js"></script>
        <div id="bp26-z-tooltip"></div>
        <script>
            function bp26OffsetZimCanvas() {
                const placeholder = document.getElementById("header-placeholder");
                const offset = Math.max(64, placeholder ? placeholder.offsetHeight : 0);
                document.querySelectorAll("canvas").forEach((canvas) => {
                    canvas.style.marginTop = offset + "px";
                    canvas.style.height = `calc(100vh - ${offset}px)`;
                });
            }

            window.addEventListener("load", () => {
                bp26OffsetZimCanvas();
                let tries = 0;
                const i = setInterval(() => {
                    bp26OffsetZimCanvas();
                    tries += 1;
                    if (tries > 20) clearInterval(i);
                }, 150);
            });
            window.addEventListener("resize", bp26OffsetZimCanvas);
        </script>

        <!-- Score submission setup-->
        <script>
            // Set the game name to be used the database insert
            window.addEventListener("DOMContentLoaded", () => {
                if (window.bp26Init) {
                    window.bp26Init({ game: "bp26-Game6", day: 6 });
                }
            });

            // Submit score function
            async function submitScoreNow(finalScore) {
                if (typeof window.reportScore !== "function") {
                    console.warn("[BP26] reportScore() not found. Check that ./js/bp26-score.js is loading.");
                    return;
                }

                try {
                    await window.reportScore(finalScore);
                    console.log("[BP26] ✅ reportScore success");
                } catch (err) {
                    console.error("[BP26] ❌ reportScore failed", err);
                }
            }
        </script>
        <!-- Score submission logic -->
        <script type="module" src="./js/bp26-score.js"></script>
    </body>
</html>
